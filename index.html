<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Além da Sanidade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Além da Sanidade</h1>

<form>

<section id="ficha">

  <div class="card">
    <h2>Informações</h2>
    <div class="grid">
      <input id="nome" name="nome" placeholder="Nome">
      <input id="idade" name="idade" placeholder="Idade">
      <input id="ocupacao" name="ocupação" placeholder="Ocupação">
      <input id="sexo" name="sexo" placeholder="Sexo">
      <input id="residencia" name="residência" placeholder="Residencia">
      <input id="nascimento" nome="nascimento" placeholder="Nascimento">
    </div>
  </div>

  <div class="card">
    <h2>Atributos</h2>
    <div class="grid">
      <input id="forca" name="forca" placeholder="FOR">
      <input id="constituicao" name="constituicao" placeholder="CON">
      <input id="tamanho" name="tamanho" placeholder="TAM">
      <input id="destreza" name="destreza" placeholder="DES">
      <input id="aparencia" name="aparencia" placeholder="APA">
      <input id="inteligencia" name="inteligencia" placeholder="INT">
      <input id="poder" name="poder" placeholder="POD">
      <input id="educacao" name="educacao" placeholder="EDU">
      <input id="sorte" name="sorte" placeholder="Sorte">
    </div>
  </div>

  <div class="card">
    <h2>Status</h2>
    <p>HP: <span id="vida">0</span></p>
    <p>SAN: <span id="sanidade">0</span></p>
    <p>PTS MG: <span id="pts de magia">0</span></p>
  </div>

  <div class="card">
    <h2>Combate</h2>
    <p>Dano: <span id="dano_extra">0</span></p>
    <p>Corpo: <span id="corpo">0</span></p>
  </div>

  <div class="card">
    <h2>Perícias</h2>
    <div id="pericias-container"></div>
  </div>

</section>

</form>

<script src="script.js"></script>
</body>
</html>
