<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Além da Sanidade</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Além da Sanidade</h1>

<form>

<section id="ficha">

  <div class="card">
    <h2>Informações</h2>
    <input type="text" id="nome" placeholder="Nome">
    <input type="number" id="idade" placeholder="Idade">
  </div>

  <div class="card">
    <h2>Atributos</h2>
    <div class="grid">
      <input id="forca" placeholder="FOR">
      <input id="constituicao" placeholder="CON">
      <input id="tamanho" placeholder="TAM">
      <input id="destreza" placeholder="DES">
      <input id="aparencia" placeholder="APA">
      <input id="inteligencia" placeholder="INT">
      <input id="poder" placeholder="POD">
      <input id="educacao" placeholder="EDU">
    </div>
  </div>

  <div class="card">
    <h2>Status</h2>
    <p>HP: <span id="vida"></span></p>
  </div>

  <div class="card">
    <h2>Combate</h2>
    <p>Dano: <span id="dano_extra"></span></p>
    <p>Corpo: <span id="corpo"></span></p>
  </div>

  <div class="card">
    <h2>Perícias</h2>
    <div id="pericias-container"></div>
  </div>

</section>

</form>

<script src="script.js"></script>
</body>
